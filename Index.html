<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Digital Photobooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff477e;
            --bg: #fff5f7;
            --dark: #2d3436;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.8rem; color: var(--primary); }

        /* Container utama yang menyesuaikan layar */
        .booth-card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Viewport Video Responsive */
        .viewport {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Membuat kotak sempurna 1:1 */
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }

        .flash-active { animation: flashAnim 0.4s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        .controls { width: 100%; }

        .btn-capture {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-capture:active { transform: scale(0.95); }

        /* Gallery Grid */
        .gallery-label { font-weight: bold; margin-top: 20px; font-size: 0.9rem; }
        .gallery {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 kolom foto */
            gap: 10px;
            margin-top: 10px;
        }

        .gallery img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>✨ Photobooth</h1>
        <p>ID: <b>booth-01</b></p>
    </div>

    <div class="booth-card">
        <div class="viewport">
            <div id="flash"></div>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="controls">
            <button class="btn-capture" onclick="takePhoto()">AMBIL FOTO 📸</button>
        </div>
    </div>

    <div class="gallery-label">Hasil Foto Anda:</div>
    <div class="gallery" id="gallery"></div>

    <canvas id="canvas" width="1080" height="1080" style="display:none;"></canvas>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const video = document.getElementById('localVideo');
        const canvas = document.getElementById('canvas');
        const flash = document.getElementById('flash');
        const gallery = document.getElementById('gallery');

        const peer = new Peer('booth-01');

        peer.on('open', () => {
            navigator.mediaDevices.getUserMedia({video: { aspectRatio: 1 }, audio: false})
            .then(stream => {
                video.srcObject = stream;
                peer.on('call', call => call.answer(stream));
            });
        });

        function takePhoto() {
            flash.classList.remove('flash-active');
            void flash.offsetWidth;
            flash.classList.add('flash-active');

            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 1080, 1080);
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            gallery.prepend(img);
        }
    </script>
</body>
</html>
